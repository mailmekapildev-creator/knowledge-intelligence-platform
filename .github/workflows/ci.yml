name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app || true   # non-blocking for now; tighten to a hard gate once stable

      - name: Security static analysis (bandit)
        run: |
          pip install bandit
          bandit -r app -ll || true

      - name: Unit + integration tests
        env:
          MOCK_MODE: "true"
        run: |
          PYTHONPATH=. pytest ../tests -q

      - name: RAG evaluation gate (golden dataset)
        env:
          MOCK_MODE: "true"
        run: |
          cd ..
          python evaluation/ragas_eval.py

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t kip-backend:ci -f backend/Dockerfile backend

      - name: Build worker image
        run: docker build -t kip-worker:ci -f backend/Dockerfile.worker backend
