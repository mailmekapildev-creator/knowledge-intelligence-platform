apiVersion: apps/v1
kind: Deployment
metadata:
  name: kip-backend
  labels:
    app: kip-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kip-backend
  template:
    metadata:
      labels:
        app: kip-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/kip-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: kip-config
            - secretRef:
                name: kip-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kip-backend
spec:
  selector:
    app: kip-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
