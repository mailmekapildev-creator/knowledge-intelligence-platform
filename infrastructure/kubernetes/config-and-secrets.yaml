apiVersion: v1
kind: ConfigMap
metadata:
  name: kip-config
data:
  MOCK_MODE: "false"
  LLM_MODEL_PRIMARY: "claude-sonnet-5"
  LLM_MODEL_FALLBACK: "claude-haiku-4-5-20251001"
  HYBRID_VECTOR_WEIGHT: "0.6"
  HYBRID_BM25_WEIGHT: "0.4"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
---
# NEVER commit real secret values. This is a template -- populate via `kubectl create
# secret` or, in production, via the cloud secrets manager + External Secrets Operator
# (see docs/security.md -- "Secrets management").
apiVersion: v1
kind: Secret
metadata:
  name: kip-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  DATABASE_URL: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
