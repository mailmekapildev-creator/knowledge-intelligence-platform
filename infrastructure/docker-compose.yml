services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kip
      POSTGRES_PASSWORD: kip
      POSTGRES_DB: kip
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kip"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kip
      MINIO_ROOT_PASSWORD: kip12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MOCK_MODE: "true"           # flip to "false" + set ANTHROPIC_API_KEY for real inference
      DATABASE_URL: postgresql+asyncpg://kip:kip@postgres:5432/kip
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    environment:
      MOCK_MODE: "true"
      DATABASE_URL: postgresql+asyncpg://kip:kip@postgres:5432/kip
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2   # illustrates independent worker scaling from the API tier

volumes:
  pgdata:
  miniodata:
